<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 后台管理系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
<div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
  <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">注册</h1>
  <form id="registerForm">
    <div class="mb-4">
      <label for="username" class="block text-sm font-medium text-gray-700">用户名 (3-8位中文/字母/数字)</label>
      <input type="text" id="username" name="username" placeholder="请输入用户名"
             class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
             required>
    </div>
    <div class="mb-4">
      <label for="account" class="block text-sm font-medium text-gray-700">账号 (6-12位字母或数字)</label>
      <input type="text" id="account" name="account" placeholder="请输入账号"
             class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
             required>
    </div>
    <div class="mb-4">
      <label for="password" class="block text-sm font-medium text-gray-700">密码 (6-12位字母或数字)</label>
      <input type="password" id="password" name="password" placeholder="请输入密码"
             class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
             required>
    </div>
    <div class="mb-6">
      <label for="passwordack" class="block text-sm font-medium text-gray-700">确认密码</label>
      <input type="password" id="passwordack" name="passwordack" placeholder="请再次输入密码"
             class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
             required>
    </div>
    <div id="errorMsg" class="text-red-500 text-sm mb-2 hidden"></div>
    <button type="submit"
            class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
      注册
    </button>
    <div class="mt-4 text-center">
      <a href="/login" class="text-sm text-blue-600 hover:text-blue-500">已有账号？立即登录</a>
    </div>
  </form>
</div>
<script>
  const registerForm = document.getElementById('registerForm');
  const errorMsgDiv = document.getElementById('errorMsg');

  registerForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsgDiv.classList.add('hidden');

    const formData = new FormData(registerForm);
    const password = formData.get('password');
    const passwordAck = formData.get('passwordack');

    if (password !== passwordAck) {
      errorMsgDiv.textContent = '两次输入的密码不一致';
      errorMsgDiv.classList.remove('hidden');
      return;
    }

    try {
      const response = await fetch('/api/register', {
        method: 'POST',
        body: formData
      });
      const result = await response.json();
      if (result.success) {
        alert('注册成功，请登录');
        window.location.href = '/login';
      } else {
        errorMsgDiv.textContent = result.message || '注册失败';
        errorMsgDiv.classList.remove('hidden');
      }
    } catch (err) {
      errorMsgDiv.textContent = '网络错误，请稍后重试';
      errorMsgDiv.classList.remove('hidden');
    }
  });
</script>
</body>
</html>
